hero:
  title: "Let Us Manage Your Vacation Property"
  subtitle: "Unlock the full potential of your vacation rental. Contact us today for a free consultation!"
  cta_text: "Schedule Time With Us"
  cta_link: "/contact/"

sections:
  - id: "property-mgmt"
    title: "Property Mgmt"
    services:
      - title: "In-House Maintenance"
        icon: "🛠️"
        description: "Employs staff rather than contractors, saving owners money by reducing outsourcing costs and ensuring consistent quality and responsiveness."
      - title: "Property Inspections"
        icon: "🔍"
        description: "Regular and thorough checks of the property to identify and address maintenance issues, ensure compliance with safety standards, and verify that amenities are in good condition."
      - title: "Tech Package"
        icon: "💾"
        description: "Include smart locks, cameras, a home hub, and Wi-Fi routers to enhance security, convenience, and connectivity for guests and safety for homes."
      - title: "Pool/Hot Tub Maintenance"
        icon: "🏊"
        description: "Regular cleaning and chemical balancing to ensure safe, enjoyable amenities for guests."
      - title: "Preventative Maintenance"
        icon: "📅"
        description: "Regular property inspections and upkeep to ensure guest satisfaction and prolong the life of rental assets. Ex. Furnace checks & AC tuneups."
      - title: "Emergency Repairs"
        icon: "🚨"
        description: "Swift, effective solutions to unexpected issues, ensuring guest safety and comfort while minimizing downtime."
      - title: "Propane Tank Service"
        icon: "🔥"
        description: "Regular monitoring and refilling to ensure uninterrupted heating and cooking facilities for guests."
      - title: "Snow Removal"
        icon: "❄️"
        description: "Timely clearing of driveways and walkways, maintaining safe and accessible properties for guests."
      - title: "Lawn Care"
        icon: "🌱"
        description: "Routine mowing, watering, and landscaping to enhance curb appeal and guest satisfaction."

  - id: "guest-relations"
    title: "Guest Relations"
    services:
      - title: "Check-in / Check-out Support"
        icon: "🔑"
        description: "Streamlines guest transitions with efficient processes and personalized assistance, enhancing overall satisfaction."
      - title: "24/7 Guest Communication"
        icon: "💬"
        description: "Round-the-clock support, addressing inquiries and resolving issues promptly to improve guest experiences."
      - title: "Calendar Management"
        icon: "🗓️"
        description: "Optimizes booking schedules, avoids double bookings, and maximizes occupancy rates for increased revenue."
      - title: "Guest Screenings"
        icon: "🛡️"
        description: "Verifying identities and assessing risk to ensure responsible occupancy and property safety."
      - title: "Damage Claims"
        icon: "📝"
        description: "Assessing, documenting, and resolving property damages caused by guests to maintain standards and manage financial risks."
      - title: "Insurance Coverage"
        icon: "🧷"
        description: "Protects owners against property damage, liability, and loss of income, ensuring financial stability and risk management."

  - id: "housekeeping"
    title: "Housekeeping"
    services:
      - title: "Turnover Cleaning"
        icon: "🧹"
        description: "Efficiently coordinating cleaning, maintenance, and restocking tasks between guest check-outs and check-ins to ensure the property is pristine and ready for the next visitors."
      - title: "Supplies & Stocking"
        icon: "🧻"
        description: "Ensures essential items are replenished regularly, maintaining high standards of comfort and convenience for guests."
      - title: "Cleaner Management"
        icon: "👥"
        description: "Coordinates housekeeping schedules and standards to ensure properties are immaculate for each guest's arrival."
      - title: "Replacement Item Services"
        icon: "🔄"
        description: "Timely replenishment of essentials like toiletries and linens to maintain guest satisfaction and comfort."
      - title: "Linen Refresh Program"
        icon: "🛏️"
        description: "Provides regular replacement and laundering of linens, maintaining a fresh and inviting atmosphere for guests."
      - title: "Deep Cleaning Program"
        icon: "✨"
        description: "Thorough cleaning services twice a year, ensuring pristine conditions for guest comfort and property care."

  - id: "owners"
    title: "Owners"
    services:
      - title: "Flexible Owner Stays"
        icon: "🏠"
        description: "Allows property owners to enjoy their space while maximizing rental income by blocking off dates as needed."
      - title: "Owners Portal"
        icon: "💻"
        description: "Real-time access to property performance data, financial reports, and booking details for owners' convenience."
      - title: "Trust Accounting"
        icon: "💰"
        description: "Managing funds received from guests, such as rental payments, in a separate trust account to ensure transparency and legal compliance. This process helps safeguard guest funds until they are rightfully earned by the property owner."
      - title: "Licensing/Regulation Advocacy"
        icon: "⚖️"
        description: "Obtaining permits and adhering to regulations to legally operate rental properties, ensuring compliance and guest safety."
      - title: "Owner Statements"
        icon: "📊"
        description: "Detailed financial breakdowns, keeping property owners informed about income, expenses, and occupancy."
      - title: "Preferred Contract Network"
        icon: "🤝"
        description: "Comprises trusted vendors offering discounted rates for property maintenance and services."
