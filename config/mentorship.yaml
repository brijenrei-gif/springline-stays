hero:
  title: "Learn to Self-Manage Your Rental"
  subtitle: "Stop paying 20% to a property manager. In 12 months, I'll teach you everything I know — then you keep 100% of your profits."
  cta_text: "Book a Free Strategy Call"
  cta_link: "/contact/"

intro:
  headline: "What If You Could Fire Your Property Manager?"
  body: >
    Most property managers take 20% of your gross revenue — year after year.
    On a property earning $60,000/year, that's $12,000 out of your pocket annually.
    Over 5 years? That's $60,000 you'll never see again.
    I built my own systems, hired my own teams, and self-manage multiple
    short-term rentals across multiple states. Now I'm offering to teach you
    exactly how I do it.

