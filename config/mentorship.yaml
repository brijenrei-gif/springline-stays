deliverables:
  - icon: "📋"
    title: "Complete SOP Library"
    description: "Step-by-step procedures for every aspect of STR operations — check-in, cleaning, maintenance, emergencies."
  - icon: "📱"
    title: "Tech Stack Blueprint"
    description: "Exact tools, apps, and automations I use daily. No guessing — just plug and play."
  - icon: "🤝"
    title: "Vendor Network"
    description: "My vetted cleaners, handymen, and contractors. Relationships that took years to build."
  - icon: "💰"
    title: "Pricing Playbook"
    description: "Dynamic pricing strategies, seasonal adjustments, and competitor analysis frameworks."
  - icon: "📞"
    title: "Guest Communication Templates"
    description: "Pre-written messages for every scenario — booking confirmations, check-in instructions, reviews, complaints."
  - icon: "📊"
    title: "Financial Dashboard"
    description: "Spreadsheets and tracking tools to monitor revenue, expenses, and profitability per property."

faq:
  - question: "How is this different from a course?"
    answer: "Courses are passive — you watch videos alone. This is 1-on-1 mentorship with an active operator. When your guest locks themselves out at 2am, I'm the one you call. You learn by doing, with real support."
  - question: "Why do you charge 10% commission during the year?"
    answer: "It aligns our incentives. I make more when you make more, so I'm motivated to help you maximize revenue — not just collect a flat fee and disappear."
  - question: "What happens after the 12 months?"
    answer: "You're fully independent. No ongoing fees, no commission split. You keep 100% of your revenue and own all the systems, templates, and vendor relationships."
  - question: "Can I do this if my property is in a different city?"
    answer: "Yes. The operational systems and strategies are market-agnostic. I'll help you adapt them to your specific location. The only market-specific piece is vendor sourcing, which we'll do together."
  - question: "What if I already have a property manager?"
    answer: "Perfect — we'll build your self-management systems in parallel. When you're ready, you transition smoothly with zero downtime. Most owners can transition within the first 3 months."
  - question: "How many mentees do you take at once?"
    answer: "I cap it at 5 active mentees to ensure quality. This isn't a mass-market product — it's hands-on coaching."
  - question: "What if self-management isn't for me?"
    answer: "We'll know within the first 60 days. If it's genuinely not a fit, we'll discuss options. But honestly? If you're organized enough to own an investment property, you can self-manage one."

