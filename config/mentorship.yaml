      - "Pricing tool setup (PriceLabs or similar)"
      - "Channel manager & OTA configuration"
      - "Smart lock, cameras, and tech stack installation"
      - "Guest communication templates & automation"
      - "Cleaning team recruitment & vetting"
  - id: "operations"
    title: "Live Operations"
    timeline: "Months 3–6"
    icon: "⚙️"
    checklist:
      - "Real-time support during your first bookings"
      - "Guest issue resolution — I walk you through it live"
      - "Maintenance vendor network setup"
      - "Bookkeeping & expense tracking system"
      - "Review management & response strategy"
      - "Revenue optimization & seasonal pricing"
  - id: "independence"
    title: "Independence"
    timeline: "Months 7–12"
    icon: "🎯"
    checklist:
      - "You run everything — I'm on-call for escalations"
      - "Monthly check-ins & performance reviews"
      - "Advanced strategies: multi-property, direct booking site"
      - "Emergency runbook & contingency planning"
      - "Final handoff: SOPs, vendor contacts, full system access"
